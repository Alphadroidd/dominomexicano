<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0618">
<title>Dominó Mexicano</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0618;--s1:#160d28;--s2:#1e1235;--s3:#271842;
  --b1:#3a1f5e;--b2:#4d2b7a;
  --accent:#c084fc;--accent2:#818cf8;
  --gold:#fbbf24;--green:#34d399;--red:#f87171;
  --text:#f0e8ff;--text2:#c4b8d8;--muted:#7a6d90;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(192,132,252,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 90%,rgba(129,140,248,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.screen{display:none;min-height:100vh;padding:20px 16px 100px;flex-direction:column}
.screen.active{display:flex}
.logo{font-size:11px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:4px}
.page-title{font-size:30px;font-weight:800;line-height:1.1;margin-bottom:22px}
.page-title span{color:var(--accent)}
.slabel{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px;margin-bottom:12px}
input[type=text],input[type=number]{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:13px 14px;font-family:'Syne',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:10px}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,132,252,.12)}
input::placeholder{color:var(--muted)}
input:disabled{opacity:.3;cursor:not-allowed}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 20px;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,#a855f7,#818cf8);color:#fff}
.btn-primary:active{transform:scale(.97);filter:brightness(.9)}
.btn-secondary{background:var(--s2);border:1px solid var(--b1);color:var(--text)}
.btn-secondary:active{background:var(--s3)}
.btn-ghost{background:transparent;border:1px solid var(--b1);color:var(--muted);font-size:13px;padding:10px 16px}
.btn-sm{padding:9px 14px;font-size:13px;margin-bottom:0;width:auto;border-radius:9px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.top-bar-title{font-size:20px;font-weight:800;flex:1}
.player-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 12px;transition:border-color .2s}
.player-row:focus-within{border-color:var(--b2)}
.color-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,.15);transition:transform .15s}
.color-dot:active{transform:scale(1.15)}
.player-row input{margin:0;border:none;background:transparent;padding:4px 0;font-size:15px;flex:1}
.player-row input:focus{border-bottom:1.5px solid var(--accent);border-radius:0;box-shadow:none}
.remove-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;padding:16px;backdrop-filter:blur(4px);animation:fadeIn .15s}
.panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:20px;width:100%;animation:slideUp .2s ease}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:14px}
.color-opt{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s}
.color-opt:active{transform:scale(1.2)}
.color-opt.sel{border-color:#fff;transform:scale(1.1)}
.rank-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.rank-item:last-child{border-bottom:none}
.rank-pos{width:24px;text-align:center;font-size:13px;flex-shrink:0}
.rank-pos.p1{font-size:19px}
.rank-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.rank-name{flex:1;font-weight:600;font-size:15px}
.rank-score{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--accent)}
.rank-item.r1 .rank-score{color:var(--gold)}
.round-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:8px}
.round-row:last-child{border-bottom:none}
.rnum{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:11px;width:20px;flex-shrink:0}
.rwinner{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.rwinner-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rchips{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.chip{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:3px 7px;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.dot-xs{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.winner-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.wbtn{background:var(--s2);border:2px solid var(--b1);border-radius:12px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.wbtn:active{transform:scale(.97)}
.wbtn.sel{border-color:var(--accent);background:rgba(192,132,252,.12)}
.wbtn-name{font-size:13px;font-weight:700;color:var(--text2)}
.wbtn.sel .wbtn-name{color:var(--accent)}
.score-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.score-row:last-child{border-bottom:none}
.score-pinfo{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.score-pname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.score-ctrl input{width:68px;text-align:center;margin:0;padding:9px 6px;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.icon-btn{background:var(--s2);border:1px solid var(--b1);border-radius:9px;color:var(--accent);font-size:17px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.icon-btn:active{background:var(--b1)}
.piece-modal{position:fixed;inset:0;background:rgba(8,2,18,.96);z-index:400;overflow-y:auto;padding:16px 14px 40px;animation:fadeIn .15s}
.piece-modal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.piece-total-bar{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.piece-total-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.piece-total-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--accent)}
.pieces-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:7px;margin-bottom:20px}
.ptile{background:var(--s1);border:1.5px solid var(--b1);border-radius:9px;padding:9px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .12s;user-select:none}
.ptile:active{transform:scale(.92)}
.ptile.sel{background:rgba(192,132,252,.18);border-color:var(--accent)}
.phalves{display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;line-height:1;color:var(--text)}
.pdiv{width:26px;height:1.5px;background:var(--b2);border-radius:1px;margin:2px 0}
.pval{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
.ptile.sel .pval{color:var(--accent)}
.prog-track{background:var(--s2);border-radius:4px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s ease}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;letter-spacing:.04em;border:1px solid var(--b1);background:var(--s2);color:var(--muted)}
.badge-live{border-color:rgba(52,211,153,.4);color:var(--green);background:rgba(52,211,153,.08)}
.badge-live::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.badge-acc{border-color:rgba(192,132,252,.4);color:var(--accent);background:rgba(192,132,252,.1)}
.badge-gold{border-color:rgba(251,191,36,.4);color:var(--gold);background:rgba(251,191,36,.1)}
.tabs{display:flex;gap:4px;background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:4px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .18s}
.tab.active{background:var(--s1);color:var(--text);border:1px solid var(--b1)}
.podium{background:linear-gradient(135deg,rgba(192,132,252,.12),rgba(129,140,248,.08));border:1px solid rgba(192,132,252,.35);border-radius:var(--r);padding:32px 20px;text-align:center;margin-bottom:14px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:13px 22px;font-size:14px;font-weight:600;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:calc(100vw - 32px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
.spinner{width:34px;height:34px;border:3px solid var(--b1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.load-center{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:36px 0}
.empty .ei{font-size:44px;margin-bottom:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-0{margin-bottom:0}
.flex{display:flex}.aic{align-items:center}.jcb{justify-content:space-between}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade-in{animation:fadeIn .25s ease}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<!-- LOADING -->

<div id="screen-loading" class="screen active">
  <div class="load-center">
    <div style="font-size:48px">🎲</div>
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px">Carregando...</div>
  </div>
</div>

<!-- HOME -->

<div id="screen-home" class="screen">
  <div class="top-bar">
    <div>
      <div class="logo">🎲 Dominó Mexicano</div>
      <div style="font-size:24px;font-weight:800">Partidas</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="showNewGame()">+ Nova</button>
  </div>
  <div id="home-content"><div class="load-center"><div class="spinner"></div></div></div>
</div>

<!-- NEW GAME -->

<div id="screen-new-game" class="screen">
  <div class="top-bar">
    <button class="btn btn-ghost btn-sm mb-0" onclick="showScreen('screen-home')">← Voltar</button>
    <div class="top-bar-title">Nova Partida</div>
  </div>
  <div class="slabel">Nome da partida</div>
  <input type="text" id="game-name-input" placeholder="Ex: Churrasco do Zé">
  <div class="slabel mt-8">Jogadores <span id="pcount" style="color:var(--muted);font-size:12px;font-weight:400"></span></div>
  <div id="players-list"></div>
  <button class="btn btn-secondary mt-8" id="add-player-btn" onclick="addPlayer()">+ Adicionar jogador</button>
  <div style="height:14px"></div>
  <button class="btn btn-primary" onclick="createGame()">🎲 Iniciar Partida</button>
</div>

<!-- GAME -->

<div id="screen-game" class="screen">
  <div style="margin-bottom:14px">
    <div class="top-bar" style="margin-bottom:10px">
      <button class="btn btn-ghost btn-sm mb-0" onclick="showScreen('screen-home')">← Sair</button>
      <div id="game-name-disp" style="font-size:13px;font-weight:700;color:var(--muted);flex:1;text-align:center"></div>
      <button class="btn btn-ghost btn-sm mb-0" onclick="shareGame()">🔗</button>
    </div>
    <div class="flex aic jcb" style="margin-bottom:10px">
      <div>
        <div class="slabel" style="margin-bottom:4px">Rodada</div>
        <div id="round-disp" style="font-size:32px;font-weight:800;line-height:1">1</div>
      </div>
      <div id="game-badge"></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="round-prog" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-ranking" onclick="switchTab('ranking')">🏆 Ranking</div>
    <div class="tab" id="tab-rounds" onclick="switchTab('rounds')">📋 Rodadas</div>
  </div>
  <div id="tab-ranking-content">
    <div class="card fade-in" id="ranking-card">
      <div class="load-center" style="padding:20px 0"><div class="spinner"></div></div>
    </div>
  </div>
  <div id="tab-rounds-content" style="display:none">
    <div class="card fade-in" id="rounds-card"></div>
  </div>

  <div id="add-round-wrap">
    <button class="btn btn-primary" onclick="showAddRound()">+ Registrar Rodada</button>
  </div>
  <div id="inline-gameover" style="display:none"></div>
</div>

<!-- ADD ROUND -->

<div id="screen-add-round" class="screen">
  <div class="top-bar">
    <button class="btn btn-ghost btn-sm mb-0" onclick="showScreen('screen-game')">← Voltar</button>
    <div class="top-bar-title" id="add-round-title">Rodada 1</div>
  </div>
  <div class="slabel">Quem ganhou esta rodada?</div>
  <div class="winner-grid" id="winner-grid" style="margin-bottom:16px"></div>
  <div class="slabel mt-8">Pontos restantes nas mãos</div>
  <div class="card" style="padding:10px 16px">
    <div id="score-inputs"></div>
  </div>
  <button class="btn btn-primary" onclick="saveRound()">✅ Salvar Rodada</button>
</div>

<!-- GAME OVER -->

<div id="screen-gameover" class="screen">
  <div class="logo">🎲 Dominó Mexicano</div>
  <div class="page-title">Fim de <span>Jogo!</span></div>
  <div id="gameover-content"></div>
  <button class="btn btn-primary" onclick="showScreen('screen-home')">🏠 Voltar ao Início</button>
  <button class="btn btn-secondary" onclick="showNewGame()">🎲 Nova Partida</button>
</div>

</div>

<!-- PIECE MODAL -->

<div id="piece-modal" style="display:none" class="piece-modal">
  <div class="piece-modal-top">
    <div style="font-size:17px;font-weight:700" id="piece-modal-title">Selecionar peças</div>
    <button class="btn btn-ghost btn-sm mb-0" onclick="closePieceModal()">✕ Fechar</button>
  </div>
  <div class="piece-total-bar">
    <div class="piece-total-lbl">Total selecionado</div>
    <div class="piece-total-val"><span id="piece-total">0</span> pts</div>
  </div>
  <div class="pieces-grid" id="pieces-grid"></div>
  <button class="btn btn-primary mb-0" onclick="confirmPieces()">
    ✅ Confirmar — <span id="piece-confirm-val">0</span> pontos
  </button>
</div>

<!-- COLOR PICKER -->

<div id="color-overlay" style="display:none" class="overlay" onclick="closeColorPicker(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <div style="font-weight:700;font-size:16px;margin-bottom:2px">Cor do jogador</div>
    <div class="color-grid" id="color-grid"></div>
    <button class="btn btn-ghost mt-8 mb-0" onclick="closeColorPicker()">Fechar</button>
  </div>
</div>

<script>
// ─────────────────────────────────────
//  FIREBASE CONFIG
// ─────────────────────────────────────
const FB = 'https://domino-mexicano-74864-default-rtdb.firebaseio.com';

// ─────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────
const COLORS = [
  '#ef4444','#f97316','#eab308','#22c55e','#14b8a6',
  '#3b82f6','#8b5cf6','#ec4899','#6366f1','#f43f5e',
  '#10b981','#0ea5e9','#a855f7','#fb923c','#84cc16','#06b6d4'
];

// All 91 domino pieces (dupla-12)
const ALL_PIECES = [];
for (let a = 0; a <= 12; a++)
  for (let b = a; b <= 12; b++)
    ALL_PIECES.push({ a, b, v: a + b });

// ─────────────────────────────────────
//  STATE
// ─────────────────────────────────────
let S = {
  gameId: null,
  game: null,
  players: [
    { name: '', color: COLORS[0] },
    { name: '', color: COLORS[1] }
  ],
  colorTarget: null,
  pieceTarget: null,
  pieceSelected: [],
  selectedWinner: null,
  sseSource: null
};

// ─────────────────────────────────────
//  FIREBASE REST API
// ─────────────────────────────────────
async function fbGet(path) {
  try {
    const r = await fetch(`${FB}/${path}.json`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}
async function fbSet(path, data) {
  await fetch(`${FB}/${path}.json`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
}
async function fbPush(path, data) {
  const r = await fetch(`${FB}/${path}.json`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  return (await r.json()).name;
}

// ─────────────────────────────────────
//  REALTIME LISTENER (Server-Sent Events)
// ─────────────────────────────────────
function listenGame(id) {
  if (S.sseSource) { S.sseSource.close(); S.sseSource = null; }
  S.sseSource = new EventSource(`${FB}/games/${id}.json`);
  S.sseSource.addEventListener('put', e => {
    const d = JSON.parse(e.data);
    if (d.data) {
      S.game = d.data;
      if (document.getElementById('screen-game').classList.contains('active')) renderGame();
    }
  });
  S.sseSource.onerror = () => {};
}

// ─────────────────────────────────────
//  INIT
// ─────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const gid = params.get('game');
  if (gid) {
    await openGame(gid);
  } else {
    await loadHome();
    showScreen('screen-home');
  }
}

// ─────────────────────────────────────
//  HOME
// ─────────────────────────────────────
async function loadHome() {
  const el = document.getElementById('home-content');
  el.innerHTML = '<div class="load-center"><div class="spinner"></div></div>';
  const games = await fbGet('games') || {};
  const list = Object.entries(games)
    .filter(([, g]) => g && g.name)
    .map(([id, g]) => ({ id, ...g }))
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="ei">🎲</div>Nenhuma partida ainda.<br>Crie a primeira!</div>';
    return;
  }
  const active = list.filter(g => !g.finished);
  const done   = list.filter(g =>  g.finished);
  let html = '';
  if (active.length) html += `<div class="slabel">Em andamento</div>${active.map(gameCard).join('')}`;
  if (done.length)   html += `<div class="slabel" style="margin-top:16px">Histórico</div>${done.map(gameCard).join('')}`;
  el.innerHTML = html;
}

function gameCard(g) {
  const players = g.players || [];
  const rounds  = g.rounds ? Object.keys(g.rounds).length : 0;
  const avatars = players.slice(0, 5).map(p =>
    `<div style="width:28px;height:28px;border-radius:50%;background:${p.color};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;margin-right:-7px;border:2px solid var(--bg)">${(p.name[0]||'?').toUpperCase()}</div>`
  ).join('');
  const badge = g.finished
    ? `<span class="badge">Finalizada</span>`
    : `<span class="badge badge-live">Ao vivo</span>`;
  return `
    <div class="card" style="cursor:pointer;margin-bottom:10px" onclick="openGame('${g.id}')">
      <div class="flex aic jcb">
        <div style="font-size:16px;font-weight:700;flex:1;margin-right:10px">${esc(g.name)}</div>
        ${badge}
      </div>
      <div class="flex aic jcb" style="margin-top:10px">
        <div style="display:flex;align-items:center">${avatars}</div>
        <div style="color:var(--muted);font-size:12px;margin-left:14px">${rounds}/13 rodadas</div>
      </div>
    </div>`;
}

// ─────────────────────────────────────
//  NEW GAME
// ─────────────────────────────────────
function showNewGame() {
  S.players = [
    { name: '', color: COLORS[0] },
    { name: '', color: COLORS[1] }
  ];
  document.getElementById('game-name-input').value = '';
  renderPlayers();
  showScreen('screen-new-game');
}

function renderPlayers() {
  document.getElementById('players-list').innerHTML = S.players.map((p, i) => `
    <div class="player-row">
      <div class="color-dot" style="background:${p.color}" onclick="openColorPicker(${i})"></div>
      <input type="text" placeholder="Jogador ${i+1}" value="${esc(p.name)}"
             oninput="S.players[${i}].name=this.value">
      ${S.players.length > 2
        ? `<button class="remove-btn" onclick="removePlayer(${i})">×</button>` : ''}
    </div>`).join('');
  document.getElementById('pcount').textContent = `(${S.players.length}/8)`;
  document.getElementById('add-player-btn').style.display = S.players.length >= 8 ? 'none' : '';
}

function addPlayer() {
  if (S.players.length >= 8) return;
  S.players.push({ name: '', color: COLORS[S.players.length % COLORS.length] });
  renderPlayers();
}

function removePlayer(i) {
  S.players.splice(i, 1);
  renderPlayers();
}

function openColorPicker(i) {
  S.colorTarget = i;
  document.getElementById('color-grid').innerHTML = COLORS.map(c =>
    `<div class="color-opt ${S.players[i].color===c?'sel':''}"
          style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
  document.getElementById('color-overlay').style.display = 'flex';
}

function pickColor(c) {
  if (S.colorTarget !== null) {
    S.players[S.colorTarget].color = c;
    renderPlayers();
  }
  closeColorPicker();
}

function closeColorPicker(e) {
  if (!e || e.target === document.getElementById('color-overlay'))
    document.getElementById('color-overlay').style.display = 'none';
}

async function createGame() {
  const name = document.getElementById('game-name-input').value.trim() || 'Partida sem nome';
  // Read current values from inputs before creating
  document.querySelectorAll('#players-list input').forEach((inp, i) => {
    if (S.players[i]) S.players[i].name = inp.value.trim();
  });
  const valid = S.players.filter(p => p.name);
  if (valid.length < 2) { toast('❌ Adicione pelo menos 2 jogadores com nome'); return; }

  const game = {
    name,
    players: valid.map(p => ({ name: p.name, color: p.color })),
    rounds: {},
    finished: false,
    createdAt: Date.now()
  };
  const id = await fbPush('games', game);
  S.gameId = id;
  S.game = { ...game, id };
  listenGame(id);
  renderGame();
  showScreen('screen-game');
  toast('🎲 Partida criada!');
}

// ─────────────────────────────────────
//  OPEN EXISTING GAME
// ─────────────────────────────────────
async function openGame(id) {
  showScreen('screen-loading');
  const game = await fbGet(`games/${id}`);
  if (!game) { toast('❌ Partida não encontrada'); await loadHome(); showScreen('screen-home'); return; }
  S.gameId = id;
  S.game = { ...game, id };
  listenGame(id);
  renderGame();
  showScreen('screen-game');
}

// ─────────────────────────────────────
//  GAME SCREEN
// ─────────────────────────────────────
function renderGame() {
  const g = S.game;
  if (!g) return;
  const rounds   = g.rounds ? Object.values(g.rounds) : [];
  const rNum     = rounds.length + 1;
  const finished = g.finished || rounds.length >= 13;

  document.getElementById('game-name-disp').textContent = g.name;
  document.getElementById('round-prog').style.width = `${Math.min(rounds.length / 13 * 100, 100)}%`;

  if (finished) {
    document.getElementById('round-disp').innerHTML =
      `<span style="color:var(--gold)">✓</span> <span style="font-size:18px;color:var(--muted);font-weight:600">13 / 13</span>`;
    document.getElementById('game-badge').innerHTML = `<span class="badge badge-gold">🏆 Finalizada</span>`;
  } else {
    document.getElementById('round-disp').innerHTML =
      `${rNum}<span style="font-size:16px;color:var(--muted);font-weight:600"> / 13</span>`;
    document.getElementById('game-badge').innerHTML = `<span class="badge badge-acc">Rodada ${rNum}</span>`;
  }

  const scores = computeScores(g);
  renderRanking(scores);
  renderRoundsHistory(rounds, g.players);

  document.getElementById('add-round-wrap').style.display  = finished ? 'none' : '';
  document.getElementById('inline-gameover').style.display = finished ? '' : 'none';

  if (finished) {
    const w = scores[0];
    document.getElementById('inline-gameover').innerHTML = `
      <div class="podium" style="margin-bottom:10px">
        <div style="font-size:44px;margin-bottom:12px">🏆</div>
        <div style="font-size:22px;font-weight:800;color:${w.color}">${esc(w.name)}</div>
        <div style="color:var(--muted);font-size:13px;margin:4px 0 8px">Vencedor — menos pontos!</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--gold)">${w.total} pts</div>
      </div>
      <button class="btn btn-secondary" onclick="showGameOver()">Ver resultado completo →</button>`;
  }
}

function computeScores(g) {
  const rounds = g.rounds ? Object.values(g.rounds) : [];
  return (g.players || [])
    .map((p, idx) => ({
      ...p, idx,
      total: rounds.reduce((s, r) => s + ((r.scores && r.scores[idx]) || 0), 0)
    }))
    .sort((a, b) => a.total - b.total);
}

function renderRanking(scores) {
  document.getElementById('ranking-card').innerHTML = scores.map((p, rank) => `
    <div class="rank-item ${rank===0?'r1':''}">
      <div class="rank-pos ${rank===0?'p1':''}">${rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':rank+1}</div>
      <div class="rank-avatar" style="background:${p.color}">${(p.name[0]||'?').toUpperCase()}</div>
      <div class="rank-name">${esc(p.name)}</div>
      <div class="rank-score">${p.total}</div>
    </div>`).join('');
}

function renderRoundsHistory(rounds, players) {
  const el = document.getElementById('rounds-card');
  if (!rounds.length) {
    el.innerHTML = '<div class="empty" style="padding:20px 0">Nenhuma rodada registrada ainda</div>';
    return;
  }
  el.innerHTML = rounds.map((r, i) => {
    const w = players[r.winnerIdx] || {};
    const chips = (r.scores || []).map((s, pi) => {
      if (pi === r.winnerIdx) return '';
      const pl = players[pi] || {};
      return `<span class="chip"><span class="dot-xs" style="background:${pl.color}"></span>${s}</span>`;
    }).join('');
    return `
      <div class="round-row">
        <div class="rnum">${i+1}</div>
        <div class="rwinner">
          <span class="dot-xs" style="background:${w.color}"></span>
          <span class="rwinner-name">${esc(w.name)}</span>
          <span style="font-size:11px;color:var(--green);flex-shrink:0">✓ ganhou</span>
        </div>
        <div class="rchips">${chips}</div>
      </div>`;
  }).join('');
}

function switchTab(t) {
  document.getElementById('tab-ranking').classList.toggle('active', t==='ranking');
  document.getElementById('tab-rounds').classList.toggle('active',  t==='rounds');
  document.getElementById('tab-ranking-content').style.display = t==='ranking' ? '' : 'none';
  document.getElementById('tab-rounds-content').style.display  = t==='rounds'  ? '' : 'none';
}

// ─────────────────────────────────────
//  ADD ROUND
// ─────────────────────────────────────
function showAddRound() {
  const g = S.game;
  const rNum = (g.rounds ? Object.keys(g.rounds).length : 0) + 1;
  S.selectedWinner = null;

  document.getElementById('add-round-title').textContent = `Rodada ${rNum}`;

  document.getElementById('winner-grid').innerHTML = g.players.map((p, i) => `
    <div class="wbtn" id="wbtn-${i}" onclick="selectWinner(${i})">
      <div style="width:42px;height:42px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff">${(p.name[0]||'?').toUpperCase()}</div>
      <div class="wbtn-name">${esc(p.name)}</div>
    </div>`).join('');

  document.getElementById('score-inputs').innerHTML = g.players.map((p, i) => `
    <div class="score-row">
      <div class="score-pinfo">
        <div style="width:32px;height:32px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0">${(p.name[0]||'?').toUpperCase()}</div>
        <div class="score-pname">${esc(p.name)}</div>
      </div>
      <div class="score-ctrl">
        <button class="icon-btn" onclick="openPieceModal(${i})" title="Calcular pela peças">🎯</button>
        <input type="number" id="si-${i}" min="0" value="0">
      </div>
    </div>`).join('');

  showScreen('screen-add-round');
}

function selectWinner(idx) {
  S.selectedWinner = idx;
  document.querySelectorAll('.wbtn').forEach((b, i) => b.classList.toggle('sel', i===idx));
  S.game.players.forEach((_, i) => {
    const inp = document.getElementById(`si-${i}`);
    if (!inp) return;
    if (i === idx) { inp.value = 0; inp.disabled = true; }
    else           { inp.disabled = false; }
  });
}

async function saveRound() {
  if (S.selectedWinner === null) { toast('❌ Selecione quem ganhou!'); return; }
  const g = S.game;
  const scores = g.players.map((_, i) => {
    if (i === S.selectedWinner) return 0;
    return parseInt(document.getElementById(`si-${i}`)?.value) || 0;
  });

  const rounds = { ...(g.rounds || {}) };
  const n = String(Object.keys(rounds).length + 1).padStart(2, '0');
  rounds[`r${n}`] = { winnerIdx: S.selectedWinner, scores, ts: Date.now() };

  const finished = Object.keys(rounds).length >= 13;
  const updated  = { ...g, rounds, finished };
  await fbSet(`games/${S.gameId}`, updated);
  S.game = updated;

  showScreen('screen-game');
  renderGame();
  toast('✅ Rodada salva!');
  if (finished) setTimeout(showGameOver, 700);
}

// ─────────────────────────────────────
//  PIECE MODAL
// ─────────────────────────────────────
function openPieceModal(playerIdx) {
  S.pieceTarget   = playerIdx;
  S.pieceSelected = [];
  const p = S.game.players[playerIdx];
  document.getElementById('piece-modal-title').textContent = `Peças de ${p.name}`;
  document.getElementById('piece-total').textContent = '0';
  document.getElementById('piece-confirm-val').textContent = '0';

  document.getElementById('pieces-grid').innerHTML = ALL_PIECES.map((piece, i) => `
    <div class="ptile" id="pt-${i}" onclick="togglePiece(${i})">
      <div class="phalves">
        <span>${piece.a}</span>
        <div class="pdiv"></div>
        <span>${piece.b}</span>
      </div>
      <div class="pval">${piece.v}pts</div>
    </div>`).join('');

  document.getElementById('piece-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function togglePiece(i) {
  const pos = S.pieceSelected.indexOf(i);
  if (pos === -1) S.pieceSelected.push(i);
  else S.pieceSelected.splice(pos, 1);
  document.getElementById(`pt-${i}`).classList.toggle('sel', S.pieceSelected.includes(i));
  const total = S.pieceSelected.reduce((s, idx) => s + ALL_PIECES[idx].v, 0);
  document.getElementById('piece-total').textContent = total;
  document.getElementById('piece-confirm-val').textContent = total;
}

function confirmPieces() {
  const total = S.pieceSelected.reduce((s, i) => s + ALL_PIECES[i].v, 0);
  const inp = document.getElementById(`si-${S.pieceTarget}`);
  if (inp) inp.value = total;
  closePieceModal();
  toast(`🎯 ${total} pontos calculados`);
}

function closePieceModal() {
  document.getElementById('piece-modal').style.display = 'none';
  document.body.style.overflow = '';
}

// ─────────────────────────────────────
//  GAME OVER
// ─────────────────────────────────────
function showGameOver() {
  const g = S.game;
  const scores = computeScores(g);
  const w = scores[0];
  document.getElementById('gameover-content').innerHTML = `
    <div class="podium">
      <div style="font-size:52px;margin-bottom:14px">🏆</div>
      <div style="font-size:28px;font-weight:800;color:${w.color};margin-bottom:4px">${esc(w.name)}</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:10px">Vencedor com menos pontos!</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--gold)">${w.total} pts</div>
    </div>
    <div class="card">
      <div class="slabel">Placar Final</div>
      ${scores.map((p, rank) => `
        <div class="rank-item ${rank===0?'r1':''}">
          <div class="rank-pos ${rank===0?'p1':''}">${rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':rank+1}</div>
          <div class="rank-avatar" style="background:${p.color}">${(p.name[0]||'?').toUpperCase()}</div>
          <div class="rank-name">${esc(p.name)}</div>
          <div class="rank-score">${p.total}</div>
        </div>`).join('')}
    </div>`;
  showScreen('screen-gameover');
}

// ─────────────────────────────────────
//  SHARE
// ─────────────────────────────────────
function shareGame() {
  const url = `${location.origin}${location.pathname}?game=${S.gameId}`;
  if (navigator.share) {
    navigator.share({ title: S.game?.name || 'Dominó Mexicano', text: 'Entre na partida!', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('🔗 Link copiado!'));
  } else {
    prompt('Copie o link:', url);
  }
}

// ─────────────────────────────────────
//  SCREEN NAV
// ─────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'screen-home') loadHome();
}

// ─────────────────────────────────────
//  TOAST
// ─────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─────────────────────────────────────
//  UTILS
// ─────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ─────────────────────────────────────
//  BOOT
// ─────────────────────────────────────
init();
</script>

</body>
</html>
